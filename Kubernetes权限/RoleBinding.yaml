apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-pods-binding
  namespace: dev
subjects: # 绑定的对象
  - kind: User # User / Group / ServiceAccount
    name: alice
    apiGroup: rbac.authorization.k8s.io
roleRef: # 绑定的角色
  kind: Role # Role / ClusterRole
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
